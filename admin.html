<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="assets/brand/logo-gites-helene.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Administration tarifs — Gîtes Hélène</title>
</head>
<body class="pricing-page admin-page">
  <!-- Connexion -->
  <div id="login-screen" class="login-panel">
    <h1 class="login-title">Bienvenue ! Qui êtes-vous ?</h1>
    <div class="user-buttons">
      <button type="button" class="user-btn" data-user="Hélène">Hélène</button>
      <button type="button" class="user-btn" data-user="Lily">Lily</button>
    </div>
    <form id="login-form" class="login-form hidden" novalidate>
      <label class="field-label" for="password">Mot de passe</label>
      <input id="password" class="field-input" type="password" autocomplete="current-password" required>
      <label class="checkbox-row">
        <input id="remember-me" type="checkbox">
        Se souvenir de moi
      </label>
      <button type="submit" class="btn btn-primary" style="width:100%">Se connecter</button>
      <p id="login-error" class="login-error hidden" role="alert">Mot de passe incorrect. Réessayez.</p>
    </form>
  </div>

  <!-- Application admin -->
  <div id="admin-app" class="admin-shell hidden">
    <button type="button" id="sidebar-toggle" class="admin-menu-btn" aria-label="Ouvrir le menu">
      <span></span><span></span><span></span>
    </button>

    <aside id="admin-sidebar" class="admin-sidebar">
      <button type="button" id="sidebar-close" class="admin-sidebar__close" aria-label="Fermer le menu">&times;</button>
      <nav class="admin-nav" aria-label="Administration">
        <button type="button" class="admin-nav__link is-active" data-admin-view="tarifs" aria-current="page">Tarifs</button>
        <button type="button" class="admin-nav__link" data-admin-view="parametres">Paramètres</button>
        <button type="button" class="admin-nav__link" data-admin-view="historique">Historique</button>
        <button type="button" id="logout-btn" class="admin-nav__link admin-nav__link--logout">Déconnexion</button>
      </nav>
    </aside>

    <main class="admin-main">
      <!-- Tarifs -->
      <section class="admin-view" data-admin-view="tarifs">
        <header class="admin-page-header">
          <h1 class="admin-page-title">Tarifs par période</h1>
        </header>
        <div id="gites-accordion" class="admin-gites-list" aria-live="polite"></div>
        <button type="button" id="save-btn" class="btn btn-success admin-save-btn">Enregistrer les modifications</button>
        <p id="save-feedback" class="admin-save-feedback hidden" role="status"></p>
      </section>

      <!-- Paramètres -->
      <section class="admin-view hidden" data-admin-view="parametres">
        <header class="admin-page-header">
          <h1 class="admin-page-title">Paramètres</h1>
        </header>

        <div class="admin-settings-row">
          <label class="admin-settings-label" for="settings-email">Adresse email</label>
          <div class="admin-settings-field">
            <input id="settings-email" class="admin-settings-input" type="email" autocomplete="email">
            <button type="button" id="settings-email-btn" class="btn btn-primary admin-settings-btn">Modifier</button>
          </div>
          <p id="settings-email-feedback" class="admin-inline-feedback hidden" role="status"></p>
        </div>

        <hr class="admin-settings-divider">

        <div class="admin-settings-row">
          <span class="admin-settings-label">Mot de passe</span>
          <div class="admin-settings-field admin-settings-field--end">
            <button type="button" id="password-toggle-btn" class="btn btn-primary admin-settings-btn">Modifier</button>
          </div>
        </div>

        <div id="password-panel" class="admin-password-panel hidden">
          <form id="password-form" class="admin-password-form" novalidate>
            <label class="field-label" for="current-password">Mot de passe actuel</label>
            <input id="current-password" class="field-input" type="password" autocomplete="current-password" required>
            <label class="field-label" for="new-password">Nouveau mot de passe</label>
            <input id="new-password" class="field-input" type="password" autocomplete="new-password" required>
            <label class="field-label" for="confirm-password">Confirmer le nouveau mot de passe</label>
            <input id="confirm-password" class="field-input" type="password" autocomplete="new-password" required>
            <button type="submit" class="btn btn-primary">Enregistrer le mot de passe</button>
          </form>
          <p id="password-feedback" class="admin-inline-feedback hidden" role="status"></p>
        </div>
      </section>

      <!-- Historique -->
      <section class="admin-view hidden" data-admin-view="historique">
        <header class="admin-page-header">
          <h1 class="admin-page-title">Historique</h1>
        </header>
        <div class="admin-history-wrap">
          <table class="admin-history-table">
            <thead>
              <tr>
                <th>Modification</th>
                <th>Utilisateur</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="js/admin.js" defer></script>
</body>
</html>
